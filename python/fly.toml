app = 'ugforce-face'
primary_region = 'sin'

[build]

[env]
  TF_CPP_MIN_LOG_LEVEL = '3'
  TF_ENABLE_ONEDNN_OPTS = '0'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
